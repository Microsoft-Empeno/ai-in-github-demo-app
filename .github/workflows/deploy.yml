name: Deploy to Azure

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Provision infra and deploy app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate infrastructure (what-if)
        run: |
          az deployment sub what-if \
            --location westeurope \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam

      - name: Deploy infrastructure (Bicep)
        id: infra
        run: |
          outputs=$(az deployment sub create \
            --name "taskmgr-$(date +%Y%m%d%H%M%S)" \
            --location westeurope \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --query properties.outputs -o json)
          echo "swaName=$(echo "$outputs" | jq -r '.staticWebAppName.value')" >> "$GITHUB_OUTPUT"
          echo "rgName=$(echo "$outputs" | jq -r '.resourceGroupName.value')" >> "$GITHUB_OUTPUT"
          echo "swaHost=$(echo "$outputs" | jq -r '.staticWebAppHostname.value')" >> "$GITHUB_OUTPUT"
          echo "funcName=$(echo "$outputs" | jq -r '.functionAppName.value')" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Function App
        run: dotnet publish src/TaskManager.Api --configuration Release --output ./api_output

      - name: Wait for storage role assignment to propagate
        run: sleep 90

      - name: Deploy Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ steps.infra.outputs.funcName }}
          package: ./api_output

      - name: Get Static Web App deployment token
        id: token
        run: |
          token=$(az staticwebapp secrets list \
            --name "${{ steps.infra.outputs.swaName }}" \
            --resource-group "${{ steps.infra.outputs.rgName }}" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Deploy front end to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.token.outputs.token }}
          action: "upload"
          app_location: "frontend"
          skip_app_build: true
          skip_api_build: true
          output_location: ""

      - name: Summary
        run: |
          echo "### Deployed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Static Web App: \`${{ steps.infra.outputs.swaName }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Function App: \`${{ steps.infra.outputs.funcName }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: https://${{ steps.infra.outputs.swaHost }}" >> "$GITHUB_STEP_SUMMARY"
