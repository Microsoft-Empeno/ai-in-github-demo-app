<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager — Dashboard</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <nav class="nav">
      <span class="nav__brand">
        <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 0a8 8 0 100 16A8 8 0 008 0zM4.5 7.75a.75.75 0 011.28-.53l1.47 1.47 3.47-3.47a.75.75 0 111.06 1.06l-4 4a.75.75 0 01-1.06 0l-2-2a.75.75 0 01-.22-.53z" />
        </svg>
        Task Manager API
      </span>
      <div class="nav__links">
        <a class="nav__link is-active" href="/index.html">Tasks</a>
        <a class="nav__link" href="/ai-features.html">GitHub AI Features</a>
        <a class="nav__link" href="/ai-in-action.html">AI in Action</a>
        <a class="nav__link" href="/demo-script.html">Demo Script</a>
      </div>
    </nav>

    <main class="container">
      <header class="hero">
        <h1>Tasks</h1>
        <p>A live front end for the .NET 10 Azure Functions API — create, complete, and delete tasks.</p>
      </header>

      <section class="card">
        <form id="task-form" class="task-form">
          <div class="field" style="grid-column: 1 / -1;">
            <label for="title">Title</label>
            <input id="title" name="title" type="text" placeholder="What needs doing?" required />
          </div>
          <div class="field" style="grid-column: 1 / 3;">
            <label for="description">Description</label>
            <input id="description" name="description" type="text" placeholder="Optional details" />
          </div>
          <div class="field">
            <label for="priority">Priority</label>
            <select id="priority" name="priority">
              <option value="1">Low</option>
              <option value="2" selected>Medium</option>
              <option value="3">High</option>
            </select>
          </div>
          <div class="field">
            <label for="dueDate">Due date</label>
            <input id="dueDate" name="dueDate" type="date" />
          </div>
          <button class="btn" type="submit">Add task</button>
        </form>
      </section>

      <div id="task-list" class="task-list" style="margin-top: 24px;"></div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="/js/app.js"></script>
  </body>
</html>
